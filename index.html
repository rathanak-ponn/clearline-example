<!doctype html>
<html lang="en">
<head>

  <title>Westmore — Residential Atelier</title>
  <style>
/* =========================================================================
   Westmore — colors_and_type.css
   The complete visual foundation: type scale, color tokens, semantic vars.
   Import this file at the top of any Westmore artifact.
   ========================================================================= */

/* -----------------------------------------------------------------------
   Webfonts — Google Fonts substitutes
   Display: Cormorant Garamond  (substituted for a transitional serif —
   replace with the licensed display face once we secure one)
   Body:    Manrope             (substituted for a humanist sans —
   replace with the licensed text face)
   ----------------------------------------------------------------------- */
@import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Manrope:wght@300;400;500;600;700&display=swap");

:root {
  /* ==========================================================
     COLOR — raw palette
     Warm, residential, restrained. Inspired by limestone,
     linen, ink on cream paper, and aged brass.
     ========================================================== */

  /* Neutrals — the system runs on these */
  --c-ink:        #1B1F26;  /* near-black, warm. Primary text. */
  --c-graphite:   #3A3F47;  /* secondary text */
  --c-stone:      #6E6A62;  /* tertiary text, muted */
  --c-silt:       #A39E92;  /* hairlines, captions */
  --c-sand:       #D9D2C2;  /* dividers, soft fills */
  --c-linen:      #EFEAE0;  /* surface — cards, hover */
  --c-paper:      #F6F2E9;  /* canvas — page background */
  --c-bone:       #FBF8F2;  /* lightest surface */
  --c-white:      #FFFFFF;

  /* Accent — brass, used like jewelry: small, intentional */
  --c-brass-900:  #6E5530;
  --c-brass-700:  #8A6D3F;
  --c-brass:      #A88B5C;  /* the accent */
  --c-brass-300:  #C8B58A;
  --c-brass-100:  #ECE2CC;

  /* Warm — clay, for the rare accent and select photography tones */
  --c-clay:       #B8765A;
  --c-clay-100:   #E9D6CA;

  /* Deep — ink-on-paper, used for hero backgrounds */
  --c-midnight:   #161A21;
  --c-loden:      #2F3A33;  /* deep olive — rare, for secondary backgrounds */

  /* Status — kept restrained, never neon */
  --c-success:    #4F6B4E;
  --c-warning:    #B08545;
  --c-danger:     #8C4A3A;

  /* ==========================================================
     COLOR — semantic
     Use these in components, not the raw palette.
     ========================================================== */
  --fg-1:         var(--c-ink);       /* body */
  --fg-2:         var(--c-graphite);  /* secondary */
  --fg-3:         var(--c-stone);     /* tertiary */
  --fg-4:         var(--c-silt);      /* captions, placeholders */
  --fg-inverse:   var(--c-bone);

  --bg-canvas:    var(--c-paper);     /* page */
  --bg-surface:   var(--c-bone);      /* cards on canvas */
  --bg-raised:    var(--c-white);     /* dialogs */
  --bg-sunken:    var(--c-linen);     /* input fills, sections */
  --bg-inverse:   var(--c-midnight);

  --line-soft:    var(--c-sand);
  --line:         var(--c-silt);
  --line-strong:  var(--c-graphite);

  --accent:       var(--c-brass);
  --accent-ink:   var(--c-brass-900);
  --accent-soft:  var(--c-brass-100);

  /* ==========================================================
     TYPE — families
     ========================================================== */
  --font-display: "Cormorant Garamond", "Cormorant", "EB Garamond", Georgia, serif;
  --font-text:    "Manrope", "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono:    ui-monospace, "SFMono-Regular", "JetBrains Mono", Menlo, monospace;

  /* ==========================================================
     TYPE — scale (modular, ratio ~1.25, perfect-fourth ish)
     ========================================================== */
  --fs-12: 0.75rem;     /* 12 — micro, eyebrows */
  --fs-13: 0.8125rem;   /* 13 — captions */
  --fs-14: 0.875rem;    /* 14 — small body */
  --fs-16: 1rem;        /* 16 — body */
  --fs-18: 1.125rem;    /* 18 — lead */
  --fs-20: 1.25rem;     /* 20 */
  --fs-24: 1.5rem;      /* 24 — h5 */
  --fs-30: 1.875rem;    /* 30 — h4 */
  --fs-36: 2.25rem;     /* 36 — h3 */
  --fs-48: 3rem;        /* 48 — h2 */
  --fs-64: 4rem;        /* 64 — h1 */
  --fs-88: 5.5rem;      /* 88 — display */
  --fs-128: 8rem;       /* 128 — editorial */

  /* line-heights */
  --lh-tight:   1.02;
  --lh-snug:    1.15;
  --lh-display: 1.05;
  --lh-body:    1.55;
  --lh-loose:   1.7;

  /* letter-spacing */
  --tracking-display: -0.015em;
  --tracking-body:     0em;
  --tracking-eyebrow:  0.18em;
  --tracking-label:    0.06em;

  /* ==========================================================
     SPACING — 4px base, generous
     ========================================================== */
  --space-0:   0;
  --space-1:   4px;
  --space-2:   8px;
  --space-3:   12px;
  --space-4:   16px;
  --space-5:   20px;
  --space-6:   24px;
  --space-8:   32px;
  --space-10:  40px;
  --space-12:  48px;
  --space-16:  64px;
  --space-20:  80px;
  --space-24:  96px;
  --space-32:  128px;
  --space-40:  160px;
  --space-48:  192px;

  /* ==========================================================
     RADII — minimal. Westmore is square-edged.
     ========================================================== */
  --radius-0:  0px;
  --radius-1:  2px;   /* default — inputs, cards */
  --radius-2:  4px;
  --radius-pill: 999px;  /* used only for pills/tags */

  /* ==========================================================
     SHADOWS — soft, low, paper-on-paper
     ========================================================== */
  --shadow-1: 0 1px 0 0 rgba(27, 31, 38, 0.04);
  --shadow-2: 0 1px 2px 0 rgba(27, 31, 38, 0.06), 0 1px 0 0 rgba(27, 31, 38, 0.04);
  --shadow-3: 0 8px 24px -8px rgba(27, 31, 38, 0.10), 0 2px 4px -2px rgba(27, 31, 38, 0.06);
  --shadow-4: 0 24px 48px -16px rgba(27, 31, 38, 0.14), 0 4px 8px -4px rgba(27, 31, 38, 0.06);

  /* ==========================================================
     MOTION — slow, certain, never bouncy
     ========================================================== */
  --ease-standard: cubic-bezier(0.32, 0.08, 0.24, 1);
  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in:       cubic-bezier(0.5, 0, 0.75, 0);
  --dur-1: 120ms;
  --dur-2: 220ms;
  --dur-3: 360ms;
  --dur-4: 600ms;
  --dur-5: 900ms;
}

/* =========================================================================
   SEMANTIC TYPE STYLES
   Use these classes (or @apply-style variables) directly.
   ========================================================================= */

html, body {
  font-family: var(--font-text);
  font-size: var(--fs-16);
  line-height: var(--lh-body);
  color: var(--fg-1);
  background: var(--bg-canvas);
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.display-xl, h1.display {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: var(--fs-128);
  line-height: var(--lh-display);
  letter-spacing: var(--tracking-display);
  color: var(--fg-1);
}

.display, h1 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: var(--fs-88);
  line-height: var(--lh-display);
  letter-spacing: var(--tracking-display);
  color: var(--fg-1);
}

h2 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: var(--fs-64);
  line-height: var(--lh-display);
  letter-spacing: var(--tracking-display);
  color: var(--fg-1);
}

h3 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: var(--fs-48);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-display);
  color: var(--fg-1);
}

h4 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: var(--fs-36);
  line-height: var(--lh-snug);
  color: var(--fg-1);
}

h5 {
  font-family: var(--font-text);
  font-weight: 500;
  font-size: var(--fs-20);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-label);
  color: var(--fg-1);
}

h6 {
  font-family: var(--font-text);
  font-weight: 600;
  font-size: var(--fs-14);
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-eyebrow);
  text-transform: uppercase;
  color: var(--fg-2);
}

p { font-size: var(--fs-16); line-height: var(--lh-body); color: var(--fg-1); }
.lead { font-size: var(--fs-20); line-height: var(--lh-loose); color: var(--fg-2); }
.small, small { font-size: var(--fs-14); line-height: var(--lh-body); color: var(--fg-2); }
.caption { font-size: var(--fs-13); line-height: var(--lh-snug); color: var(--fg-3); letter-spacing: 0.01em; }

.eyebrow {
  font-family: var(--font-text);
  font-weight: 500;
  font-size: var(--fs-12);
  letter-spacing: var(--tracking-eyebrow);
  text-transform: uppercase;
  color: var(--fg-3);
}

.italic-display {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 400;
}

code, pre, .mono { font-family: var(--font-mono); font-size: 0.92em; }

a { color: var(--fg-1); text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px; text-decoration-color: var(--line); transition: text-decoration-color var(--dur-2) var(--ease-standard); }
a:hover { text-decoration-color: var(--accent); }

::selection { background: var(--accent-soft); color: var(--accent-ink); }
   Composed on top of /colors_and_type.css */

@import url("../../colors_and_type.css");

* { box-sizing: border-box; }
body { margin: 0; }

/* ---------- layout ---------- */
.container { max-width: 1280px; margin: 0 auto; padding: 0 64px; }
.container--narrow { max-width: 920px; margin: 0 auto; padding: 0 64px; }
.container--wide   { max-width: 1440px; margin: 0 auto; padding: 0 64px; }

.section { padding: 128px 0; }
.section--tight { padding: 80px 0; }
.section--inverse { background: var(--bg-inverse); color: var(--fg-inverse); }
.section--linen { background: var(--bg-sunken); }

/* ---------- nav ---------- */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: transparent;
  transition: background 360ms var(--ease-standard), backdrop-filter 360ms var(--ease-standard), border-color 360ms;
  border-bottom: 1px solid transparent;
}
.nav.is-scrolled {
  background: rgba(246, 242, 233, 0.78);
  backdrop-filter: blur(16px) saturate(110%);
  -webkit-backdrop-filter: blur(16px) saturate(110%);
  border-bottom-color: var(--line-soft);
}
.nav.is-inverse { color: var(--fg-inverse); }
.nav.is-inverse.is-scrolled { background: rgba(22, 26, 33, 0.78); border-bottom-color: rgba(255,255,255,0.08); }

.nav__inner { display: flex; align-items: center; justify-content: space-between; padding: 24px 0; gap: 32px; }
.nav__mark { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.28em; color: inherit; text-decoration: none; cursor: pointer; display: inline-flex; align-items: baseline; gap: 10px; white-space: nowrap; flex-shrink: 0; }
.nav__mark-sub { font-family: var(--font-text); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.55; font-weight: 500; }
.nav__links { display: flex; gap: 32px; flex-shrink: 1; }
.nav__link {
  font-family: var(--font-text); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
  color: inherit; opacity: 0.7; text-decoration: none; padding-bottom: 4px; border-bottom: 1px solid transparent;
  transition: opacity var(--dur-2) var(--ease-standard), border-color var(--dur-2);
  cursor: pointer; white-space: nowrap;
}
.nav__link:hover { opacity: 1; }
.nav__link.is-active { opacity: 1; border-bottom-color: var(--accent); }
.nav__right { display: flex; align-items: center; gap: 18px; flex-shrink: 0; }
.nav__phone {
  font-family: var(--font-text); font-size: 13px; letter-spacing: 0.04em; color: inherit; opacity: 0.7;
  text-decoration: none; font-variant-numeric: tabular-nums; white-space: nowrap;
}
.nav__phone:hover { opacity: 1; }
.nav__cta--btn {
  background: var(--c-ink); color: var(--c-bone) !important;
  padding: 12px 18px; border: none; font-family: var(--font-text); font-size: 12px;
  letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; border-radius: 2px;
  white-space: nowrap;
  transition: background var(--dur-2);
}
.nav__cta--btn:hover { background: var(--c-midnight); }
.is-inverse .nav__cta--btn { background: var(--c-bone); color: var(--c-ink) !important; }
.nav__cta {
  font-family: var(--font-text); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
  color: inherit; text-decoration: none; padding-bottom: 4px;
  cursor: pointer;
}

/* ---------- mobile nav (burger + dropdown) ---------- */
.nav__burger {
  display: none;
  width: 40px; height: 40px; padding: 0;
  background: none; border: none; cursor: pointer;
  align-items: center; justify-content: center;
  color: inherit;
}
.nav__burger-icon { position: relative; display: inline-block; width: 22px; height: 14px; }
.nav__burger-icon i {
  position: absolute; left: 0; width: 100%; height: 1.5px; background: currentColor;
  transition: transform var(--dur-2) var(--ease-standard), opacity var(--dur-1);
}
.nav__burger-icon i:nth-child(1) { top: 0; }
.nav__burger-icon i:nth-child(2) { top: 6px; }
.nav__burger-icon i:nth-child(3) { top: 12px; }
.nav__burger-icon.is-x i:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.nav__burger-icon.is-x i:nth-child(2) { opacity: 0; }
.nav__burger-icon.is-x i:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

.nav__mobile {
  overflow: hidden;
  max-height: 0;
  transition: max-height var(--dur-3) var(--ease-standard);
  background: var(--bg-canvas);
  border-bottom: 1px solid transparent;
}
.nav.is-inverse .nav__mobile { background: var(--c-midnight); }
.nav__mobile.is-open { max-height: 420px; border-bottom-color: var(--line-soft); }
.nav__mobile .container--wide { display: flex; flex-direction: column; padding-top: 8px; padding-bottom: 24px; }
.nav__mobile-link {
  font-family: var(--font-text); font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase;
  color: inherit; text-decoration: none; padding: 16px 0; border-bottom: 1px solid var(--line-soft);
  cursor: pointer;
}
.nav.is-inverse .nav__mobile-link { border-bottom-color: rgba(255,255,255,0.12); }
.nav__mobile-phone {
  font-family: var(--font-display); font-size: 28px; color: inherit; text-decoration: none;
  padding-top: 20px;
}

/* ---------- buttons ---------- */
.btn {
  display: inline-flex; align-items: center; gap: 12px;
  font-family: var(--font-text); font-size: 13px; font-weight: 500; letter-spacing: 0.08em;
  padding: 16px 24px; border-radius: 2px; border: 1px solid transparent;
  cursor: pointer; text-decoration: none;
  white-space: nowrap;
  transition: all var(--dur-2) var(--ease-standard);
}
.btn--primary { background: var(--c-ink); color: var(--c-bone); }
.btn--primary:hover { background: var(--c-midnight); }
.btn--ghost { background: transparent; color: var(--fg-1); border-color: var(--fg-1); }
.btn--ghost:hover { background: var(--bg-sunken); }
.btn--ghost-inverse { background: transparent; color: var(--fg-inverse); border-color: var(--fg-inverse); }
.btn--ghost-inverse:hover { background: rgba(255,255,255,0.06); }
.btn--link {
  background: transparent; border: none; padding: 0; color: inherit;
  font-family: var(--font-text); font-size: 13px; font-weight: 500; letter-spacing: 0.08em;
  border-bottom: 1px solid var(--line);
  padding-bottom: 4px; border-radius: 0; cursor: pointer;
  transition: border-color var(--dur-2);
}
.btn--link:hover { border-color: var(--accent); }
.btn .arrow { display: inline-block; transition: transform var(--dur-2) var(--ease-standard); }
.btn:hover .arrow { transform: translateX(3px); }

/* ---------- eyebrow ---------- */
.eyebrow {
  display: inline-flex; align-items: center; gap: 14px;
  font-family: var(--font-text); font-weight: 500; font-size: 11px;
  letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--fg-3);
}
.eyebrow::before {
  content: ""; width: 36px; height: 1px; background: var(--accent); display: inline-block;
}
.eyebrow--inverse { color: rgba(255,255,255,0.7); }

/* ---------- section header ---------- */
.section-head { margin-bottom: 80px; max-width: 760px; }
.section-head--in-grid { margin-bottom: 0; }
.section-head h2 {
  margin: 18px 0 0; font-family: var(--font-display); font-weight: 400;
  font-size: var(--fs-64); line-height: 1.32; letter-spacing: -0.015em;
}
.section-head h2 em { color: var(--accent-ink); font-style: italic; }
.section-head p { margin: 32px 0 0; color: var(--fg-2); font-size: 18px; line-height: 1.65; max-width: 60ch; }

/* ---------- image slots ---------- */
.img-slot {
  background: linear-gradient(135deg, var(--c-sand) 0%, var(--c-linen) 50%, var(--c-brass-100) 100%);
  position: relative; overflow: hidden; border-radius: 2px;
}
.img-slot--dark { background: linear-gradient(135deg, var(--c-graphite) 0%, var(--c-stone) 60%, var(--c-silt) 100%); }
.img-slot--midnight { background: linear-gradient(135deg, var(--c-midnight) 0%, #232936 80%, var(--c-graphite) 100%); }
.img-slot.has-img { background-color: var(--c-graphite); }
.img-slot::after {
  content: attr(data-caption);
  position: absolute; bottom: 16px; left: 18px;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(27,31,38,0.42);
  pointer-events: none;
}
.img-slot--dark::after, .img-slot--midnight::after, .img-slot.has-img::after { color: rgba(251,248,242,0.85); text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
.img-slot[data-caption=""]::after { display: none; }

/* ---------- hero ---------- */
.hero {
  position: relative;
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  gap: 96px;
  padding: 160px 0 96px;
}
.hero__title {
  font-family: var(--font-display); font-weight: 400;
  font-size: clamp(40px, 6vw, 88px); line-height: 1.3; letter-spacing: -0.015em;
  color: var(--fg-1); margin: 22px 0 0;
}
.hero__title em { color: var(--accent-ink); }
.hero__sub { margin: 32px 0 0; max-width: 38ch; color: var(--fg-2); font-size: 18px; line-height: 1.65; }
.hero__cta { display: flex; gap: 16px; margin-top: 40px; align-items: center; }
.hero__image { width: 100%; aspect-ratio: 3 / 4; overflow: hidden; }
.hero__image .img-slot { width: 100% !important; height: 100% !important; aspect-ratio: auto !important; }

/* ---------- work grid ---------- */
.work-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 32px; }
.work-card { grid-column: span 6; cursor: pointer; display: block; text-decoration: none; color: inherit; }
.work-card .img-wrap { overflow: hidden; aspect-ratio: 4 / 5; margin-bottom: 18px; }
.work-card .img-slot { width: 100%; height: 100%; transition: transform 600ms var(--ease-standard); }
.work-card:hover .img-slot { transform: scale(1.02); }
.work-card .meta { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; }
.work-card .meta h3 { font-family: var(--font-display); font-weight: 400; font-size: 28px; line-height: 1.15; margin: 0; }
.work-card .meta .loc { font-family: var(--font-text); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-3); }
.work-card.is-wide { grid-column: span 12; }
.work-card.is-wide .img-wrap { aspect-ratio: 16 / 9; }
.work-card.is-third { grid-column: span 4; }
.work-card.is-third .img-wrap { aspect-ratio: 3 / 4; }

/* ---------- footer ---------- */
.footer { background: var(--bg-inverse); color: var(--fg-inverse); padding: 96px 0 48px; }
.footer__top { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 64px; padding-bottom: 64px; border-bottom: 1px solid rgba(255,255,255,0.10); }
.footer h4 { font-family: var(--font-text); font-weight: 500; font-size: 11px; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: rgba(255,255,255,0.5); margin: 0 0 18px; }
.footer ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
.footer a { color: var(--fg-inverse); text-decoration: none; font-size: 14px; opacity: 0.85; }
.footer a:hover { opacity: 1; border-bottom: 1px solid var(--accent); padding-bottom: 2px; }
.footer__statement { font-family: var(--font-display); font-size: 28px; line-height: 1.2; max-width: 26ch; }
.footer__statement em { color: var(--c-brass-300); }
.footer__bottom { display: flex; justify-content: space-between; padding-top: 32px; font-size: 12px; letter-spacing: 0.08em; color: rgba(255,255,255,0.5); }

/* ---------- forms ---------- */
.field { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
.field label { font-family: var(--font-text); font-size: 11px; font-weight: 500; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--fg-3); }
.field input, .field textarea, .field select {
  font: inherit; font-size: 16px; color: var(--fg-1);
  background: transparent; border: none; border-bottom: 1px solid var(--line);
  padding: 12px 0; border-radius: 0;
  transition: border-color var(--dur-2);
  -webkit-appearance: none; appearance: none;
}
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none; border-bottom-color: var(--accent);
}
.field input::placeholder { color: var(--fg-4); }
.field textarea { resize: vertical; min-height: 88px; }

/* ---------- generic cards ---------- */
.card-surface {
  background: var(--bg-surface); border: 1px solid var(--line-soft); border-radius: 2px;
  padding: 40px;
  transition: box-shadow var(--dur-3) var(--ease-standard);
}
.card-surface:hover { box-shadow: var(--shadow-3); }

/* ---------- process phases ---------- */
.phases { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; border-top: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft); }
.phase { padding: 40px 28px; border-right: 1px solid var(--line-soft); }
.phase:last-child { border-right: none; }
.phase .num { font-family: var(--font-display); font-style: italic; font-size: 56px; color: var(--accent); line-height: 1; margin-bottom: 24px; }
.phase h4 { font-family: var(--font-display); font-weight: 400; font-size: 24px; line-height: 1.2; margin: 0 0 12px; }
.phase p { color: var(--fg-3); font-size: 14px; line-height: 1.6; margin: 0; }
.phase .dur { display: block; margin-top: 18px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); letter-spacing: 0.06em; }

/* ---------- stats ---------- */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 48px; }
.stat .num { font-family: var(--font-display); font-weight: 400; font-size: 72px; line-height: 1; color: var(--fg-1); letter-spacing: -0.02em; }
.stat .num em { color: var(--accent-ink); font-style: italic; }
.stat .label { display: block; margin-top: 14px; font-family: var(--font-text); font-size: 12px; letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--fg-3); }

/* ---------- filter row ---------- */
.filters { display: flex; gap: 4px; border-bottom: 1px solid var(--line-soft); margin-bottom: 64px; }
.filter {
  font-family: var(--font-text); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 18px 22px; cursor: pointer; color: var(--fg-3);
  border: none; background: none; border-bottom: 1px solid transparent; margin-bottom: -1px;
  transition: color var(--dur-2);
}
.filter.is-active { color: var(--fg-1); border-bottom-color: var(--fg-1); }
.filter:hover { color: var(--fg-1); }

/* ---------- trust pills ---------- */
.trust-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
.trust-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px; border: 1px solid var(--line-soft); background: var(--bg-surface);
  border-radius: 999px;
  font-family: var(--font-text); font-weight: 500; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--fg-2);
  white-space: nowrap;
}
.trust-pill .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--accent); }
.trust-pill .star { color: var(--accent); }

/* ---------- stats bar ---------- */
.stats-bar {
  display: grid; grid-template-columns: repeat(5, 1fr);
  border-top: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft);
  background: var(--bg-surface);
}
.stats-bar .stat-cell { padding: 36px 28px; border-right: 1px solid var(--line-soft); text-align: center; }
.stats-bar .stat-cell:last-child { border-right: none; }
.stats-bar .stat-num { font-family: var(--font-display); font-weight: 400; font-size: 56px; line-height: 1; color: var(--fg-1); letter-spacing: -0.015em; }
.stats-bar .stat-num em { color: var(--accent-ink); font-style: italic; }
.stats-bar .stat-lbl { display: block; margin-top: 12px; font-family: var(--font-text); font-weight: 500; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-3); }

/* ---------- empathy cards ---------- */
.empathy-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.empathy-card {
  background: var(--bg-surface); border: 1px solid var(--line-soft); padding: 40px;
  display: flex; flex-direction: column; gap: 24px;
}
.empathy-card .num { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; color: var(--fg-3); }
.empathy-card .quote {
  font-family: var(--font-display); font-style: italic; font-size: 21px; line-height: 1.4; color: var(--fg-1); margin: 0;
  border-left: 1px solid var(--accent); padding: 4px 0 6px 18px;
}
.empathy-card .body { font-size: 15px; line-height: 1.65; color: var(--fg-2); margin: 0; }

/* ---------- differentiators ---------- */
.diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-top: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft); }
.diff-cell { padding: 56px 40px; border-right: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft); }
.diff-cell:nth-child(2n) { border-right: none; }
.diff-cell:nth-last-child(-n+2) { border-bottom: none; }
.diff-cell .num { font-family: var(--font-display); font-style: italic; font-size: 56px; color: var(--accent); line-height: 1; margin-bottom: 18px; }
.diff-cell h3 { font-family: var(--font-display); font-weight: 400; font-size: 30px; line-height: 1.4; margin: 0 0 24px; max-width: 22ch; }
.diff-cell h3 em { color: var(--accent-ink); font-style: italic; }
.diff-cell p { font-size: 15px; line-height: 1.7; color: var(--fg-2); margin: 0; max-width: 50ch; }

/* ---------- reviews ---------- */
.review-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.review-card { background: var(--bg-surface); border: 1px solid var(--line-soft); padding: 40px; display: flex; flex-direction: column; gap: 22px; }
.review-card .stars { color: var(--accent); letter-spacing: 0.2em; font-size: 14px; }
.review-card blockquote { font-family: var(--font-display); font-size: 21px; line-height: 1.45; color: var(--fg-1); margin: 0; padding-bottom: 6px; }
.review-card .who { font-family: var(--font-text); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-3); }

/* ---------- materials ---------- */
.materials-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px 80px; }
.material h4 { font-family: var(--font-display); font-weight: 400; font-size: 28px; line-height: 1.2; margin: 0 0 10px; color: var(--fg-1); }
.material p { font-size: 15px; line-height: 1.7; color: var(--fg-2); margin: 0; max-width: 48ch; }
.material .marker { display: inline-block; width: 28px; height: 1px; background: var(--accent); vertical-align: middle; margin-right: 12px; }

/* ---------- offer box ---------- */
.offer-box {
  background: var(--bg-inverse); color: var(--fg-inverse); padding: 64px 56px; border-radius: 2px;
  position: relative; overflow: hidden;
}
.offer-box .price { font-family: var(--font-display); font-weight: 400; font-size: 96px; line-height: 1; color: var(--c-brass-300); letter-spacing: -0.02em; }
.offer-box .price em { font-style: italic; }
.offer-box .price-sub { display: block; margin-top: 12px; font-family: var(--font-text); font-weight: 500; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.65); }
.offer-box ul { list-style: none; padding: 0; margin: 36px 0 0; display: flex; flex-direction: column; gap: 18px; }
.offer-box ul li { display: flex; gap: 16px; align-items: flex-start; font-size: 15px; line-height: 1.6; color: rgba(255,255,255,0.85); }
.offer-box ul li::before {
  content: ""; flex-shrink: 0;
  display: inline-block; width: 14px; height: 1px; background: var(--c-brass-300); margin-top: 12px;
}
.offer-box ul li strong { color: var(--c-bone); font-weight: 500; }

/* ---------- FAQ ---------- */
.faq-list { display: flex; flex-direction: column; border-top: 1px solid var(--line-soft); }
.faq-item { border-bottom: 1px solid var(--line-soft); }
.faq-q {
  display: flex; align-items: baseline; gap: 24px;
  width: 100%; padding: 28px 0;
  background: none; border: none; cursor: pointer; text-align: left;
  font-family: var(--font-display); font-weight: 400; font-size: 24px; line-height: 1.3; color: var(--fg-1);
}
.faq-q .marker { color: var(--accent); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; min-width: 28px; flex-shrink: 0; }
.faq-q .toggle { margin-left: auto; font-family: var(--font-display); font-size: 28px; font-style: italic; color: var(--fg-3); transition: transform var(--dur-2); }
.faq-item.is-open .faq-q .toggle { transform: rotate(45deg); color: var(--accent); }
.faq-a {
  max-height: 0; overflow: hidden;
  transition: max-height var(--dur-3) var(--ease-standard);
}
.faq-item.is-open .faq-a { max-height: 400px; }
.faq-a-inner {
  padding: 0 0 32px 52px; font-size: 16px; line-height: 1.75; color: var(--fg-2); max-width: 72ch;

/* ---------- gallery card variant ---------- */
.gallery-meta { margin-top: 18px; }

/* ---------- Nav ---------- */
function Nav({ current, onNav, inverse }) {

      const y = root === window ? window.scrollY : root.scrollTop;

  }, []);

  const links = [

    { id: 'process',  label: 'Process' },

            <a className="nav__cta nav__cta--btn" onClick={() => go('contact')}>Book Consultation</a>

              className="nav__burger"
              aria-label={menuOpen ? 'Close menu' : 'Open menu'}
              aria-expanded={menuOpen}
              onClick={() => setMenuOpen(o => !o)}

              <span className={`nav__burger-icon ${menuOpen ? 'is-x' : ''}`}><i></i><i></i><i></i></span>

          </div>
        </div>
      </div>

      {/* Mobile dropdown panel */}
      <div className={`nav__mobile ${menuOpen ? 'is-open' : ''}`}>

/* ---------- Small primitives ---------- */
function Eyebrow({ children, inverse }) {
  return <span className={`eyebrow ${inverse ? 'eyebrow--inverse' : ''}`}>{children}</span>;
}

function SectionHeader({ eyebrow, title, body, alignedRight, inGrid }) {
  return (
    <div className={`section-head ${inGrid ? 'section-head--in-grid' : ''}`} style={alignedRight ? { marginLeft: 'auto' } : undefined}>
      {eyebrow && <Eyebrow>{eyebrow}</Eyebrow>}
      <h2 dangerouslySetInnerHTML={{ __html: title }} />
      {body && <p>{body}</p>}
    </div>
  );
}

function Button({ children, variant = 'primary', onClick, arrow }) {
  return (
    <button className={`btn btn--${variant}`} onClick={onClick}>
      <span>{children}</span>
      {arrow && <span className="arrow">→</span>}
    </button>
  );
}

function Field({ label, type = 'text', placeholder, value, onChange, textarea, options }) {
  const input =
    textarea ? <textarea placeholder={placeholder} value={value} onChange={e => onChange?.(e.target.value)} />
    : options ? (
        <select value={value} onChange={e => onChange?.(e.target.value)}>
          {options.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
      )
    : <input type={type} placeholder={placeholder} value={value} onChange={e => onChange?.(e.target.value)} />;
  return (
    <div className="field">
      <label>{label}</label>
      {input}
    </div>
  );
}

function ImageSlot({ caption, variant = 'light', aspect, style, src, position }) {
  const cls = `img-slot img-slot--${variant === 'dark' ? 'dark' : variant === 'midnight' ? 'midnight' : 'light'} ${src ? 'has-img' : ''}`;
  const bg = src ? { backgroundImage: `url("${src}")`, backgroundSize: 'cover', backgroundPosition: position || 'center' } : null;
  return (
    <div className={cls} data-caption={caption || ''} style={{ aspectRatio: aspect || undefined, ...bg, ...style }} />
  );
}

/* ---------- Work card ---------- */
function WorkCard({ project, span = 'half', onOpen }) {
  const cls = span === 'wide' ? 'work-card is-wide' : span === 'third' ? 'work-card is-third' : 'work-card';
  return (
    <a className={cls} onClick={() => onOpen?.(project)}>
      <div className="img-wrap">
        <ImageSlot caption={project.caption} variant={project.tone || 'light'} />
      </div>
      <div className="meta">
        <h3>{project.title}</h3>
        <span className="loc">{project.location}</span>
      </div>
      <div style={{ marginTop: 8, fontSize: 13, color: 'var(--fg-3)', fontFamily: 'var(--font-mono)', letterSpacing: '0.04em' }}>
        {project.type} · {project.year}
      </div>
    </a>
  );
}

/* ---------- Process phase ---------- */
function ProcessPhase({ num, title, body, duration }) {
  return (
    <div className="phase">
      <div className="num">{num}</div>
      <h4>{title}</h4>
      <p>{body}</p>
      <span className="dur">{duration}</span>
    </div>
  );
}

/* ---------- Stats ---------- */
function StatRow({ items }) {
  return (
    <div className="stats">
      {items.map((s, i) => (
        <div className="stat" key={i}>
          <div className="num" dangerouslySetInnerHTML={{ __html: s.num }} />
          <span className="label">{s.label}</span>
        </div>
      ))}
    </div>
  );
}

/* ---------- export to window ---------- */
Object.assign(window, {
  Nav, Footer, Eyebrow, SectionHeader, Button, Field, ImageSlot,
  WorkCard, ProcessPhase, StatRow,
});

  <script type="text/babel">
// Example LKN — app router (single-page homepage + contact)

const { useState } = React;

const SECTION_IDS = ['work', 'process', 'reviews', 'faq'];

function scrollToId(id) {
  const el = document.getElementById('section-' + id);
  if (!el) return;
  const target = el.getBoundingClientRect().top + (window.scrollY || window.pageYOffset) - 72;
  // Explicit 'auto' (instant) — reliable everywhere. Native 'smooth' is a no-op in some preview iframes.
  window.scrollTo({ top: target, left: 0, behavior: 'auto' });
}

function App() {
  const [screen, setScreen] = useState('home');
  const [project, setProject] = useState(null);

  const nav = (id) => {
    // In-page section links — scroll the homepage instead of routing.
    if (SECTION_IDS.includes(id)) {
      if (screen !== 'home') {
        setScreen('home');
        setTimeout(() => scrollToId(id), 120);
      } else {
        scrollToId(id);
      }
      return;
    }
    setScreen(id);
    window.scrollTo(0, 0);
  };

  const openProject = (p) => { setProject(p); };

  let content;
  switch (screen) {
    case 'home':    content = <Home onNav={nav} onOpenProject={openProject} />; break;
    case 'contact': content = <Contact />; break;
    default:        content = <Home onNav={nav} onOpenProject={openProject} />;
  }

  const navCurrent = screen;

  return (
    <React.Fragment>
      <Nav current={navCurrent} onNav={nav} />
      <main>{content}</main>
      <Footer onNav={nav} />
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
